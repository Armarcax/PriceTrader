        // ==================== PRODUCT MATCHING ALGORITHM ====================
        function calculateProductSimilarity(product1, product2) {
            const title1 = product1.name.en.toLowerCase();
            const title2 = product2.name.en.toLowerCase();
            
            // Tokenize and compare
            const tokens1 = title1.split(/[\s\-_]/).filter(t => t.length > 2);
            const tokens2 = title2.split(/[\s\-_]/).filter(t => t.length > 2);
            
            // Common tokens (brand, model, specs)
            const commonTokens = tokens1.filter(t => tokens2.includes(t));
            const tokenScore = commonTokens.length / Math.max(tokens1.length, tokens2.length);
            
            // Category match
            const categoryScore = product1.category === product2.category ? 1 : 0;
            
            // Specs similarity
            let specsScore = 0;
            if (product1.specs && product2.specs) {
                const specKeys1 = Object.keys(product1.specs);
                const specKeys2 = Object.keys(product2.specs);
                const commonSpecs = specKeys1.filter(k => specKeys2.includes(k));
                specsScore = commonSpecs.length / Math.max(specKeys1.length, specKeys2.length);
            }
            
            // Weighted final score
            const finalScore = (tokenScore * 0.5) + (categoryScore * 0.3) + (specsScore * 0.2);
            return finalScore;
        }

        function matchProducts(products, threshold = 0.7) {
            const groups = [];
            const used = new Set();
            
            for (let i = 0; i < products.length; i++) {
                if (used.has(i)) continue;
                
                const group = [products[i]];
                used.add(i);
                
                for (let j = i + 1; j < products.length; j++) {
                    if (used.has(j)) continue;
                    
                    const similarity = calculateProductSimilarity(products[i], products[j]);
                    if (similarity >= threshold) {
                        group.push(products[j]);
                        used.add(j);
                        products[j].matchScore = similarity;
                    }
                }
                
                groups.push(group);
            }
            
            return groups;
        }

                                        className="rounded"
                                    />
                                    <span className={`marketplace-badge ${mp.class}`}>{mp.icon} {mp.name}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                    
                    {/* Shipping */}
                    <div>
                        <label className="flex items-center gap-2 cursor-pointer">
                            <input
                                type="checkbox"
                                checked={filters.freeShipping}
                                onChange={e => setFilters({...filters, freeShipping: e.target.checked})}
                                className="rounded"
                            />
                            <span className="text-sm text-gray-700 dark:text-gray-300">🚚 Free Shipping Only</span>
                        </label>
                    </div>
                    
                    {/* In Stock */}
                    <div>
                        <label className="flex items-center gap-2 cursor-pointer">
                            <input
                                type="checkbox"
                                checked={filters.inStockOnly}
                                onChange={e => setFilters({...filters, inStockOnly: e.target.checked})}
                                className="rounded"
                            />
                            <span className="text-sm text-gray-700 dark:text-gray-300">✅ In Stock Only</span>
                        </label>
                    </div>
                    
                    {/* Rating */}
                    <div>
                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">⭐ {t.rating}</label>
                        <input
                            type="range"
                            min="0"
                            max="5"
                            step="0.5"
                            value={filters.minRating}
                            onChange={e => setFilters({...filters, minRating: parseFloat(e.target.value)})}
                            className="w-full"
                        />
                        <div className="text-sm text-gray-600 dark:text-gray-400">Min: {filters.minRating}⭐</div>
                    </div>
                </div>
            );
        }

        // Price History Chart Component
        function PriceHistoryChart({ history }) {
            const max = Math.max(...history);
            const min = Math.min(...history);
            const range = max - min || 1;
            
            return (
                <div className="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 mt-4">
                    <h4 className="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">📈 Price History</h4>
                    <div className="flex items-end gap-1 h-16">
                        {history.map((price, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center">
                                <div 
                                    className="w-full bg-gradient-to-t from-primary to-secondary rounded-t opacity-75 hover:opacity-100 transition"
                                    style={{ height: `${((price - min) / range) * 100}%`, minHeight: '4px' }}
                                ></div>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-between mt-2 text-xs text-gray-500 dark:text-gray-400">
                        <span>Min: ${min}</span>
                        <span>Max: ${max}</span>
                    </div>
                </div>
            );
        }

        // Product Card Component
        function ProductCard({ product, onSelect, t, userTokens, setUserTokens }) {
            const bestPrice = Math.min(...product.prices.filter(p => p.inStock).map(p => p.price + p.shipping));
            const maxPrice = Math.max(...product.prices.map(p => p.price + p.shipping));
            const savings = maxPrice - bestPrice;
            const savingsPercent = ((savings / maxPrice) * 100).toFixed(0);
            
            return (
                <div 
                    className="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden card-hover cursor-pointer slide-in"
                    onClick={() => onSelect(product)}
                >
                    <div className="h-40 gradient-bg flex items-center justify-center relative">
                        <span className="text-6xl">{product.image}</span>
                        <span className={`marketplace-badge absolute top-2 right-2 ${MARKETPLACES[product.prices[0].marketplace].class}`}>
                            {product.prices.length} stores
                        </span>
                    </div>
                    <div className="p-5">
                        <span className="text-xs font-medium text-primary bg-primary bg-opacity-10 px-2 py-1 rounded-full">
                            {product.category}
                        </span>
                        <h3 className="text-lg font-bold text-gray-900 dark:text-white mt-2 mb-2 line-clamp-2">
                            {product.name.en}
                        </h3>
                        
                        {/* Specs Preview */}
                        <div className="flex gap-2 mb-3 flex-wrap">
                            {Object.entries(product.specs).slice(0, 2).map(([key, value]) => (
                                <span key={key} className="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded">
                                    {key}: {value}
                                </span>
                            ))}
                        </div>
                        
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-2xl font-bold text-primary">${bestPrice.toFixed(2)}</span>
                            {savings > 0 && (
                                <span className="text-sm text-green-600 font-medium">
                                    Save ${savings.toFixed(2)} ({savingsPercent}%)
                                </span>
                            )}
                        </div>
                        
                        {/* Token Reward */}
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-xs text-gray-500 dark:text-gray-400">🪙 {t.tokenReward}</span>
                            <span className="text-sm font-bold text-accent">+{product.tokenReward} HAYQ</span>
                        </div>
                        
                        <PriceHistoryChart history={product.priceHistory} />
                        
                        <button 
                            className="w-full mt-4 gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition"
                            onClick={(e) => {
                                e.stopPropagation();
                                setUserTokens(userTokens + product.tokenReward);
                            }}
                        >
                            {t.viewDetails} →
                        </button>
                    </div>
                </div>
            );
        }

        // Product Detail Modal Component
        function ProductDetail({ product, onClose, t, userTokens, setUserTokens }) {
            const [selectedOffer, setSelectedOffer] = useState(null);
            const bestPrice = Math.min(...product.prices.filter(p => p.inStock).map(p => p.price + p.shipping));
            const bestOffer = product.prices.filter(p => p.inStock).sort((a, b) => (a.price + a.shipping) - (b.price + b.shipping))[0];
            
            const handleBuy = (offer) => {
                setUserTokens(userTokens + product.tokenReward);
                window.open(offer.url, '_blank');
            };
            
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div 
                        className="bg-white dark:bg-gray-800 rounded-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto slide-in"
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className="sticky top-0 gradient-bg text-white px-6 py-4 flex items-center justify-between rounded-t-2xl">
                            <h2 className="text-xl font-bold">{product.name.en}</h2>
                            <button onClick={onClose} className="text-white hover:text-gray-200 text-3xl">×</button>
                        </div>
                        
                        <div className="p-6">
                            <div className="grid md:grid-cols-2 gap-8">
                                {/* Left Column - Image & Info */}
                                <div>
                                    <div className="h-64 gradient-bg rounded-xl flex items-center justify-center mb-4">
                                        <span className="text-8xl">{product.image}</span>
                                    </div>
                                    
                                    {/* Match Score */}
                                    <div className="bg-green-50 dark:bg-green-900 dark:bg-opacity-20 rounded-lg p-4 mb-4">
                                        <div className="flex items-center gap-2">
                                            <span className="text-2xl">✅</span>
                                            <div>
                                                <div className="font-semibold text-green-700 dark:text-green-400">Product Match Score</div>
                                                <div className="text-sm text-green-600 dark:text-green-500">{(product.matchScore * 100).toFixed(0)}% confidence</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Specifications */}
                                    <div className="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 mb-4">
                                        <h4 className="font-semibold mb-3 dark:text-white">⚙️ {t.specifications}</h4>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.entries(product.specs).map(([key, value]) => (
                                                <div key={key} className="text-sm">
                                                    <span className="text-gray-500 dark:text-gray-400">{key}:</span>
                                                    <span className="ml-2 font-medium dark:text-white">{value}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <PriceHistoryChart history={product.priceHistory} />
                                </div>
                                
                                {/* Right Column - Offers */}
                                <div>
                                    <h3 className="text-lg font-bold mb-4 dark:text-white">🏪 All Offers ({product.prices.length})</h3>
                                    <div className="space-y-4">
                                        {product.prices
                                            .sort((a, b) => (a.price + a.shipping) - (b.price + b.shipping))
                                            .map((offer, i) => {
                                                const mp = MARKETPLACES[offer.marketplace];
                                                const total = offer.price + offer.shipping;
                                                const isBest = total === bestPrice && offer.inStock;
                                                
                                                return (
                                                    <div 
                                                        key={i}
                                                        className={`border-2 rounded-xl p-4 transition cursor-pointer ${
                                                            isBest 
                                                                ? 'border-green-500 bg-green-50 dark:bg-green-900 dark:bg-opacity-20' 
                                                                : 'border-gray-200 dark:border-gray-600 hover:border-primary dark:bg-gray-700'
                                                        }`}
                                                        onClick={() => setSelectedOffer(offer)}
                                                    >
                                                        <div className="flex items-center justify-between mb-3">
                                                            <div className="flex items-center gap-3">
                                                                <span className={`marketplace-badge ${mp.class}`}>{mp.icon} {mp.name}</span>
                                                                {isBest && (
                                                                    <span className="text-xs bg-green-500 text-white px-2 py-1 rounded-full">🏆 {t.bestDeal}</span>
                                                                )}
                                                            </div>
                                                            <div className="text-right">
                                                                <div className="text-2xl font-bold text-gray-900 dark:text-white">${offer.price.toFixed(2)}</div>
                                                                {offer.shipping > 0 && (
                                                                    <div className="text-sm text-gray-500 dark:text-gray-400">+ ${offer.shipping} shipping</div>
                                                                )}
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="flex items-center justify-between text-sm mb-3">
                                                            <span className="text-gray-600 dark:text-gray-400">🚚 {offer.delivery}</span>
                                                            <span className="text-gray-600 dark:text-gray-400">⭐ {offer.rating}</span>
                                                        </div>
                                                        
                                                        <div className={`text-sm mb-3 ${offer.inStock ? 'text-green-600' : 'text-red-600'}`}>
                                                            {offer.inStock ? '✓ In Stock' : '✗ Out of Stock'}
                                                        </div>
                                                        
                                                        <button
                                                            onClick={() => handleBuy(offer)}
                                                            disabled={!offer.inStock}
                                                            className={`w-full py-2 rounded-lg font-medium transition ${
                                                                offer.inStock
                                                                    ? 'gradient-bg text-white hover:opacity-90'
                                                                    : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                                                            }`}
                                                        >
                                                            {offer.inStock ? `${t.buyNow} (+${product.tokenReward} HAYQ)` : t.unavailable}
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                    </div>
                                    
                                    {/* Token Reward Summary */}
                                    <div className="mt-6 bg-accent bg-opacity-10 rounded-xl p-4 token-glow">
                                        <div className="flex items-center gap-3">
                                            <span className="text-3xl">🪙</span>
                                            <div>
                                                <div className="font-bold text-accent">{t.tokenReward}</div>
                                                <div className="text-sm text-gray-600 dark:text-gray-400">Earn +{product.tokenReward} HAYQ on purchase</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Stats Dashboard Component
        function StatsDashboard({ products, t, userTokens }) {
            const totalProducts = products.length;
            const totalOffers = products.reduce((sum, p) => sum + p.prices.length, 0);
            const avgSavings = products.reduce((sum, p) => {
                if (p.prices.length < 2) return sum;
                const prices = p.prices.map(pr => pr.price + pr.shipping);
                return sum + (Math.max(...prices) - Math.min(...prices));
            }, 0) / products.filter(p => p.prices.length >= 2).length || 0;
            
            return (
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 text-center">
                        <div className="text-3xl mb-2">📦</div>
                        <div className="text-2xl font-bold text-gray-900 dark:text-white">{totalProducts}</div>
                        <div className="text-sm text-gray-500 dark:text-gray-400">{t.productsTracked}</div>
                    </div>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 text-center">
                        <div className="text-3xl mb-2">🏪</div>
                        <div className="text-2xl font-bold text-gray-900 dark:text-white">{totalOffers}</div>
                        <div className="text-sm text-gray-500 dark:text-gray-400">{t.marketplaces}</div>
                    </div>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 text-center">
                        <div className="text-3xl mb-2">💰</div>
                        <div className="text-2xl font-bold text-green-600">${avgSavings.toFixed(2)}</div>
                        <div className="text-sm text-gray-500 dark:text-gray-400">{t.savings}</div>
                    </div>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 text-center">
                        <div className="text-3xl mb-2">🪙</div>
                        <div className="text-2xl font-bold text-accent">{userTokens}</div>
                        <div className="text-sm text-gray-500 dark:text-gray-400">HAYQ Tokens</div>
                    </div>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 text-center">
                        <div className="text-3xl mb-2">🤖</div>
                        <div className="text-2xl font-bold text-primary">5</div>
                        <div className="text-sm text-gray-500 dark:text-gray-400">AI Matches</div>
                    </div>
                </div>
            );
        }

        // Telegram Bot Promo Component
        function TelegramPromo({ t }) {
            return (
                <div className="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl shadow-lg p-6 mb-8 text-white">
                    <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <span className="text-5xl">✈️</span>
                            <div>
                                <h3 className="text-xl font-bold">{t.telegram}</h3>
                                <p className="text-blue-100">Get instant price alerts and deals on Telegram!</p>
                            </div>
                        </div>
                        <a
                            href="https://t.me/pricetrader_bot"
                            target="_blank"
                            className="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-50 transition"
                        >
                            Open Bot →
                        </a>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [darkMode, setDarkMode] = useState(false);
            const [lang, setLang] = useState('hy');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [userTokens, setUserTokens] = useState(150);
            const [filters, setFilters] = useState({
                category: '',
                minPrice: '',
                maxPrice: '',
                marketplaces: Object.keys(MARKETPLACES),
                freeShipping: false,
                inStockOnly: false,
                minRating: 0
            });
            const [sortBy, setSortBy] = useState('price');
            
            const t = translations[lang];
            
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);
            
            const categories = useMemo(() => [...new Set(MOCK_PRODUCTS.map(p => p.category))], []);
            
            const filteredProducts = useMemo(() => {
                return MOCK_PRODUCTS
                    .filter(product => {
                        const name = product.name[lang] || product.name.en;
                        if (searchTerm && !name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                        if (filters.category && product.category !== filters.category) return false;
                        
                        const minProductPrice = Math.min(...product.prices.map(p => p.price + p.shipping));
                        if (filters.minPrice && minProductPrice < parseFloat(filters.minPrice)) return false;
                        if (filters.maxPrice && minProductPrice > parseFloat(filters.maxPrice)) return false;
                        if (filters.freeShipping && !product.prices.some(p => p.shipping === 0 && p.inStock)) return false;
                        if (filters.inStockOnly && !product.prices.some(p => p.inStock)) return false;
                        if (filters.minRating && Math.max(...product.prices.map(p => p.rating)) < filters.minRating) return false;
                        
                        return true;
                    })
                    .sort((a, b) => {
                        const aPrice = Math.min(...a.prices.map(p => p.price + p.shipping));
                        const bPrice = Math.min(...b.prices.map(p => p.price + p.shipping));
                        if (sortBy === 'price') return aPrice - bPrice;
                        if (sortBy === 'name') return (a.name.en || '').localeCompare(b.name.en || '');
                        if (sortBy === 'rating') return Math.max(...b.prices.map(p => p.rating)) - Math.max(...a.prices.map(p => p.rating));
                        return 0;
                    });
            }, [MOCK_PRODUCTS, searchTerm, filters, sortBy, lang]);
            
            return (
                <I18nContext.Provider value={{ lang, t }}>
                    <div className="min-h-screen bg-gray-50 dark:bg-dark transition-colors duration-300">
                        <Header 
                            darkMode={darkMode} 
                            setDarkMode={setDarkMode} 
                            lang={lang} 
                            setLang={setLang}
                            t={t}
                            userTokens={userTokens}
                        />
                        
                        <main className="max-w-7xl mx-auto px-4 py-8">
                            <SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} t={t} />
                            
                            <StatsDashboard products={MOCK_PRODUCTS} t={t} userTokens={userTokens} />
                            
                            <TelegramPromo t={t} />
                            
                            <div className="grid lg:grid-cols-4 gap-8">
                                <div className="lg:col-span-1">
                                    <FilterSidebar filters={filters} setFilters={setFilters} t={t} categories={categories} />
                                </div>
                                
                                <div className="lg:col-span-3">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-xl font-bold dark:text-white">
                                            {filteredProducts.length} {t.products}
                                        </h2>
                                        <select
                                            value={sortBy}
                                            onChange={e => setSortBy(e.target.value)}
                                            className="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary dark:bg-gray-700 dark:text-white"
                                        >
                                            <option value="price">Sort by Price</option>
                                            <option value="name">Sort by Name</option>
                                            <option value="rating">Sort by Rating</option>
                                        </select>
                                    </div>
                                    
                                    {filteredProducts.length === 0 ? (
                                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-md p-12 text-center">
                                            <div className="text-6xl mb-4">📭</div>
                                            <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-2">{t.noProducts}</h3>
                                            <p className="text-gray-600 dark:text-gray-400">Try adjusting your filters</p>
                                        </div>
                                    ) : (
                                        <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
                                            {filteredProducts.map(product => (
                                                <ProductCard 
                                                    key={product.id} 
                                                    product={product} 
                                                    onSelect={setSelectedProduct}
                                                    t={t}
                                                    userTokens={userTokens}
                                                    setUserTokens={setUserTokens}
                                                />
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>
                        
                        {/* Footer */}
                        <footer className="bg-white dark:bg-gray-800 border-t dark:border-gray-700 mt-16">
                            <div className="max-w-7xl mx-auto px-4 py-12">
                                <div className="grid md:grid-cols-4 gap-8">
                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="text-3xl">🛒</span>
                                            <span className="text-xl font-bold gradient-text">PriceTrader</span>
                                        </div>
                                        <p className="text-gray-600 dark:text-gray-400 text-sm">
                                            Compare prices across multiple marketplaces and save money on every purchase.
                                        </p>
                                    </div>
                                    <div>
                                        <h4 className="font-bold mb-4 dark:text-white">Marketplaces</h4>
                                        <ul className="space-y-2 text-gray-600 dark:text-gray-400 text-sm">
                                            {Object.values(MARKETPLACES).map(mp => (
                                                <li key={mp.name}>{mp.name}</li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-bold mb-4 dark:text-white">Features</h4>
                                        <ul className="space-y-2 text-gray-600 dark:text-gray-400 text-sm">
                                            <li>🤖 AI Product Matching</li>
                                            <li>📊 Price History</li>
                                            <li>🪙 HAYQ Rewards</li>
                                            <li>✈️ Telegram Bot</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="font-bold mb-4 dark:text-white">Legal</h4>
                                        <ul className="space-y-2 text-gray-600 dark:text-gray-400 text-sm">
                                            <li><a href="#" className="hover:text-primary transition">Privacy Policy</a></li>
                                            <li><a href="#" className="hover:text-primary transition">Terms of Service</a></li>
                                            <li><a href="#" className="hover:text-primary transition">Affiliate Disclosure</a></li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="border-t dark:border-gray-700 mt-8 pt-8 text-center text-gray-500 dark:text-gray-400 text-sm">
                                    © 2024 PriceTrader. All rights reserved. 🇦🇲 Made with ❤️ in Armenia
                                </div>
                            </div>
                        </footer>
                        
                        {/* Product Detail Modal */}
                        {selectedProduct && (
                            <ProductDetail 
                                product={selectedProduct} 
                                onClose={() => setSelectedProduct(null)}
                                t={t}
                                userTokens={userTokens}
                                setUserTokens={setUserTokens}
                            />
                        )}
                    </div>
                </I18nContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
